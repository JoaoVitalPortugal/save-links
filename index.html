<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Links</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Adicionar Link</h1>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="Nome do Link">
            <input type="text" id="urlInput" placeholder="URL do Link">
            <button id="submitButton">Adicionar</button>
        </div>
        
        <h2>Links Salvos</h2>
        <div id="linksContainer">
            </div>

        <button id="copyAllButton">Copiar Todos os Links</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
